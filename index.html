<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }
        h1 {
            background: #007bff;
            color: white;
            padding: 15px;
        }
        .card {
            display: inline-block;
            padding: 15px;
            margin: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 90%;
            background: white;
        }
        th, td {
            padding: 10px;
            border: 1px solid gray;
        }
        th {
            background: #007bff;
            color: white;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>Smart Attendance Dashboard</h1>

<div class="card">Total Students: {{ total }}</div>
<div class="card">Present: {{ present }}</div>
<div class="card">Absent: {{ absent }}</div>

<br>

<a href="/download">
    <button>Download Report</button>
</a>

<table>
<tr>
<th>Name</th>
<th>Date</th>
<th>Entry</th>
<th>Exit</th>
<th>Status</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row.Name }}</td>
<td>{{ row.Date }}</td>
<td>{{ row.Entry_Time }}</td>
<td>{{ row.Exit_Time }}</td>
<td>{{ row.Attendance_Status }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
